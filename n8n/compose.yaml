services:
  n8n:
    image: n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=jsdom
      - NODE_OPTIONS=--dns-result-order=ipv4first
    networks:
      - pw-network

  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: playwright
    init: true
    ipc: host
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./scripts:/home/pwuser/scripts        # -v /path/to/your/scripts:/scripts
    command: >
     sh -c "
      cd /home/pwuser/scripts &&
      if [ ! -d 'node_modules' ]; then
      npm init -y &&
      npm install express playwright &&
      npx playwright install --with-deps;
      fi &&
      echo '🔧 Starting Express Server...' &&
      node server.js > /tmp/server.log 2>&1 &
      sleep 2 &&
      echo '✅ Express Server started. Check logs: cat /tmp/server.log' &&
      npx playwright run-server --port 3000 --host 0.0.0.0
      "
    networks:
      - pw-network
    restart: always

volumes:
  n8n_data:

networks:
  pw-network:         

