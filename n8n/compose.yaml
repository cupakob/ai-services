services:
  n8n:
    image: n8nio/n8n
    deploy:
      resources:
        limits:
          memory: 1536M # 1.5GB
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - /etc/localtime:/etc/localtime:ro
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin
      - N8N_SECURE_COOKIE=false
      - NODE_FUNCTION_ALLOW_EXTERNAL=jsdom
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - GENERIC_TIMEZONE=Europe/Berlin
      - NODE_OPTIONS=--dns-result-order=ipv4first
    networks:
      - pw-network

  playwright:
    image: mcr.microsoft.com/playwright
    deploy:
      resources:
        limits:
          memory: 1024M
    container_name: playwright
    init: true
    ipc: host
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./scripts:/home/pwuser/scripts        # -v /path/to/your/scripts:/scripts
      - ./output:/home/pwuser/output
    command: >
     sh -c "
      cd /home/pwuser/scripts &&
      if [ ! -d 'node_modules' ]; then
      npm init -y &&
      npm install express playwright &&
      npx playwright install --with-deps;
      fi &&
      echo '🔧 Starting Express Server...' &&
      node server.js > /tmp/server.log 2>&1 &
      sleep 2 &&
      echo '✅ Express Server started. Check logs: cat /tmp/server.log' &&
      npx playwright run-server --port 3000 --host 0.0.0.0
      "
    networks:
      - pw-network
    restart: always

volumes:
  n8n_data:

networks:
  pw-network:         

